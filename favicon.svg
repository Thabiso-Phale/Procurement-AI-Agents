<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0D2B5E"/>

  <!-- Left brain hemisphere -->
  <path d="M32 10
    C24 10 17 16 17 24
    C17 28 18.5 31.5 21 34
    C19.5 35.5 18 38 19 40.5
    C20 43 22.5 43.5 24.5 42.5
    C25.5 44.5 27 46 29 46.5
    L32 47 L32 10Z"
    fill="#1D4ED8"/>

  <!-- Right brain hemisphere -->
  <path d="M32 10
    C40 10 47 16 47 24
    C47 28 45.5 31.5 43 34
    C44.5 35.5 46 38 45 40.5
    C44 43 41.5 43.5 39.5 42.5
    C38.5 44.5 37 46 35 46.5
    L32 47 L32 10Z"
    fill="#3B82F6"/>

  <!-- Centre divider -->
  <line x1="32" y1="10" x2="32" y2="47" stroke="#0D2B5E" stroke-width="1.5"/>

  <!-- Circuit nodes — left -->
  <circle cx="23" cy="20" r="2.2" fill="#93C5FD"/>
  <circle cx="20" cy="30" r="1.8" fill="#60A5FA"/>
  <circle cx="24" cy="40" r="1.6" fill="#93C5FD"/>

  <!-- Circuit nodes — right -->
  <circle cx="41" cy="20" r="2.2" fill="#BFDBFE"/>
  <circle cx="44" cy="30" r="1.8" fill="#93C5FD"/>
  <circle cx="40" cy="40" r="1.6" fill="#BFDBFE"/>

  <!-- Circuit lines — left -->
  <line x1="23" y1="20" x2="20" y2="30" stroke="#93C5FD" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="30" x2="24" y2="40" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Circuit lines — right -->
  <line x1="41" y1="20" x2="44" y2="30" stroke="#BFDBFE" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="30" x2="40" y2="40" stroke="#93C5FD" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Bottom connector bar -->
  <rect x="26" y="47" width="12" height="3" rx="1.5" fill="#60A5FA"/>
  <rect x="29" y="50" width="6" height="2.5" rx="1.2" fill="#3B82F6"/>
</svg>
